# ====================================
# NEXORA ROLEPLAY - SERVER CONFIG
# ====================================

## Server Endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 32

## License Key - BURAYA KENDİ LICENSE KEY'İNİ YAZ
sv_licenseKey "BURAYA_LICENSE_KEY_YAZIN"

## Server Info
sv_hostname "Nexora Roleplay"
sets sv_projectName "Nexora Roleplay"
sets sv_projectDesc "Türkçe Roleplay Sunucusu"
sets tags "qbcore, roleplay, turkish, nexora"
sets locale "tr-TR"

## MySQL Connection
set mysql_connection_string "mysql://fivem:NexoraRP2024!@localhost/fivem?charset=utf8mb4"

## OneSync
onesync on

## Game Build
sv_enforceGameBuild 2802

## Server Settings
sv_scriptHookAllowed 0
sv_endpointprivacy true
sv_enableNetworkedPhoneExplosions false
sv_enableNetworkedSounds false

## Rcon Password
rcon_password "NexoraRP_Admin2024"

# ====================================
# LOADING SCREEN (İLK ÖNCE)
# ====================================
start hb_loading

# ====================================
# CFX DEFAULT RESOURCES
# ====================================
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents
ensure [cfx-default]

# ====================================
# VOICE
# ====================================
ensure [voice]

# ====================================
# STANDALONE RESOURCES
# ====================================
ensure [standalone]

# ====================================
# QBCORE FRAMEWORK
# ====================================
ensure [qb]

# ====================================
# ALAN RESOURCES
# ====================================
ensure alanNotify
ensure ataturk
ensure bb-dices
ensure cloud-shop
ensure codem-adminmenu
ensure codem-garage
ensure crouch
ensure flaadev-rentcar
ensure hb_banking
ensure hb_chat
ensure hb_farming
ensure hb_me
ensure hb_mechanic
ensure hb_miner
ensure hb_motel
ensure hb_multicharacter
ensure mHud
ensure repair

# ====================================
# MESLEK (JOBS)
# ====================================
ensure [meslek]

# ====================================
# CARS
# ====================================
ensure [cars]

# ====================================
# MLO (INTERIORS)
# ====================================
ensure [mlo]

# ====================================
# STREAM (CUSTOM ASSETS)
# ====================================
ensure [stream]

# ====================================
# DEFAULT MAPS
# ====================================
ensure [defaultmaps]

# ====================================
# CONVARS
# ====================================
set sv_enforceGameBuild 2802
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3

# ====================================
# PERMISSIONS
# ====================================
add_ace group.admin command allow
add_ace group.admin command.quit deny
add_principal identifier.steam:STEAM_ID_BURAYA group.admin

# ====================================
# END OF CONFIG
# ====================================
