## You CAN edit the following:
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 7
set steam_webApiKey "none"
sets tags "default, deployer, qbcore, qb-core"

## You MAY edit the following:
sv_licenseKey "cfxk_yHoN1AKuRRi1DX0y0f3V_IVxa3"
sv_hostname "Nexora Roleplay Test Server"
sets sv_projectName "Nexora Roleplay Test Server"
sets sv_projectDesc "Nexora Roleplay Test Server"
sets locale "tr-TR" # replace with your language and location code, like en-US, pt-BR, etc
load_server_icon myLogoo.png
sv_enforceGameBuild 3258 #DLC The Chop Shop
set resources_useSystemChat false
set mysql_connection_string "mysql://root@localhost/temelPaket?charset=utf8mb4"

# Voice config
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1

# QBCore locale config
setr qb_locale "en"

# QBCore UseTarget
setr UseTarget true

# FPS Optimization Settings
## [txAdmin CFG validator]: onesync MUST only be set in the txAdmin settings page.
# set onesync on
set onesync_enableInfinity 1
set onesync_enableBeyond 1
set onesync_population true

# Network Optimization
sv_scriptHookAllowed 0
sv_enableNetworkedSounds false
sv_filterRequestControl 4

# Entity Culling (uzak nesneleri gizle)
set sv_entityCullingRadius 250.0

# Streaming Optimization
set sv_forceIndirectListing true
set sv_listingIpOverride "127.0.0.1"

# Performance Tweaks
set sv_pureLevel 1
set sv_maxUploadSize 50

