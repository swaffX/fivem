# ====================================
# NEXORA ROLEPLAY - TXADMIN SERVER CONFIG
# ====================================
# txAdmin ile kullanım için optimize edilmiştir

## Server Endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 32

## License Key - txAdmin'den otomatik ayarlanacak
## Eğer manuel ayarlamak istersen: https://keymaster.fivem.net
sv_licenseKey "cfxk_yHoN1AKuRRi1DX0y0f3V_IVxa3"

## Server Info
sv_hostname "Nexora Roleplay"
sets sv_projectName "Nexora Roleplay"
sets sv_projectDesc "Türkçe Roleplay Sunucusu"
sets tags "qbcore, roleplay, turkish, nexora"
sets locale "tr-TR"
sets Discord "https://discord.gg/nexora"

## Server Icon
load_server_icon myLogoo.png

## Steam Web API (opsiyonel)
set steam_webApiKey "none"

## MySQL Connection
set mysql_connection_string "mysql://fivem:NexoraRP2024!@localhost/temelPaket?charset=utf8mb4"

## OneSync - txAdmin tarafından yönetilir, burada yorumda bırak
## txAdmin Settings'den OneSync'i aktif et
# onesync on
set onesync_enableInfinity 1
set onesync_enableBeyond 1
set onesync_population true

## Game Build
sv_enforceGameBuild 3258

## Server Settings
sv_scriptHookAllowed 0
sv_endpointprivacy true
sv_enableNetworkedPhoneExplosions false
sv_enableNetworkedSounds false
sv_filterRequestControl 4

## Performance Optimization
set sv_entityCullingRadius 250.0
set sv_forceIndirectListing true
set sv_pureLevel 1
set sv_maxUploadSize 50

## Voice Settings
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1

## QBCore Settings
setr qb_locale "tr"
setr UseTarget true
set resources_useSystemChat false

## Rcon Password
rcon_password "NexoraRP_Admin2024"

